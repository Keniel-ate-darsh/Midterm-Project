<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superpower Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="game">
        <h1 id="title"></h1>
        <p id="description"></p>
        <p id="hint">Press H for a hint</p>
        <p id="ending"></p>

        <div id="buttons">
            <button id="button1">Wake up</button>
            <button id="button2">Stay asleep</button>
            <button id="button3">Restart</button>
            <button id="button4">Flight + SuperStrength</button>
            <button id="button5">SuperSpeed</button>
            <button id="button6">Super Healing</button>
            <button id="button7">Telekinesis</button>
            <button id="button8">Go outside</button>
            <button id="button9">Stay inside</button>
            <button id="button10">Ok</button>
            <button id="button11">Use your power to fight crime</button>
            <button id="button12">Run away</button>
            <button id="button13">Super Punch</button>
            <button id="button14">Fly into him</button>
            <button id="button15">Run donuts around him</button>
            <button id="button16">Do a super sonic punch</button>
            <button id="button17">Run straight at him</button>
            <button id="button18">Talk to him</button>
            <button id="button19">Use his weapon against him</button>
            <button id="button20">Use your telekinesis to throw him</button>
            <button id="button21">Train your power</button>
            <button id="button22">Go join a villain group</button>
            <button id="button23">Go after the top Hero</button>
            <button id="button24">Rob a bank</button>
            <button id="button25">Go join a hero group</button>
            <button id="button26">Stop a bank robbery</button>
            <button id="button27">Go after the top Villain</button>
            <button id="button28">Next</button>
        </div>

        <img id="image" src="" alt="">
    </div>
</body>
</html>
